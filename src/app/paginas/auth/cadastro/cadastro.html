<main class="login-container">
  <section class="image-section">
    <div class="menu-icon-wrapper">
      <div class="hamburger-menu"></div>
    </div>
  </section>

  <section class="form-section">
    <button class="close-btn" type="button" aria-label="Fechar" (click)="fechar()">&#x2715;</button>

    <div class="chef-animated-icon"></div>

    <div class="auth-box">
      <h1 class="auth-title">Criar sua conta</h1>
      <p class="auth-subtitle">Junte-se à nossa comunidade de cozinheiros</p>

      <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">

        <div class="field-wrapper">
          <label class="field-label" for="name">Nome completo</label>
          <div class="input-group">
            <span class="input-icon">&#128100;</span>
            <input
              formControlName="name"
              type="text"
              id="name"
              name="name"
              placeholder="Seu nome"
              required
            />
          </div>
        </div>

        <div class="field-wrapper">
          <label class="field-label" for="email">E-mail</label>
          <div class="input-group">
            <span class="input-icon">&#9993;</span>
            <input
              formControlName="email"
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />
          </div>
        </div>

        <div class="field-wrapper">
          <label class="field-label" for="password">Senha</label>
          <div class="input-group">
            <span class="input-icon">&#128274;</span>
            <input
              formControlName="password"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
            <button type="button" class="toggle-password" ></button>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          @if (estaCarregando()) {
            Cadastrando...
          } @else {
            Cadastrar conta
          }
        </button>
      </form>

      <p class="switch-auth">
        Já tem uma conta? <a href="/login">Entrar</a>
      </p>
    </div>
  </section>
</main>
